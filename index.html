<!DOCTYPE html>
<html>
<head>
    <title>Pose Landmarker - Wink Log</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #000; color: #fff; overflow: hidden; }
        .container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        #webcam { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #output_canvas { position: absolute; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #status { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px; }
        .wave-alert { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 3rem; color: #0f0; font-weight: bold; display: none; text-shadow: 0 0 10px #000; }
    </style>
</head>
<body>
    <div class="container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>
        <div id="status">Warten auf Kamera...</div>
        <div id="wave-alert" class="wave-alert">👋 WINKEN ERKANNT!</div>
    </div>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const statusElement = document.getElementById('status');
        const alertElement = document.getElementById('wave-alert');

        let lastWaveTime = 0;
        const waveHistory = [];
        const MAX_HISTORY = 10;

        function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            if (results.poseLandmarks) {
                drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 4});
                drawLandmarks(canvasCtx, results.poseLandmarks, {color: '#FF0000', lineWidth: 2});
                
                detectWave(results.poseLandmarks);
            }
            canvasCtx.restore();
        }

        const pose = new Pose({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
        });

        pose.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        pose.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                canvasElement.width = videoElement.videoWidth;
                canvasElement.height = videoElement.videoHeight;
                await pose.send({image: videoElement});
            },
            width: 1280,
            height: 720
        });

        camera.start().then(() => {
            statusElement.innerText = "Aktiv: Wink zum Loggen";
        });

        function detectWave(landmarks) {
            const nose = landmarks[0];
            const leftWrist = landmarks[15];
            const rightWrist = landmarks[16];
            
            if (!nose || (!leftWrist && !rightWrist)) return;

            const wrist = (leftWrist && (!rightWrist || leftWrist.y < rightWrist.y)) ? leftWrist : rightWrist;
            
            // Hand über Kopf
            if (wrist.y < nose.y) {
                waveHistory.push(wrist.x);
                if (waveHistory.length > MAX_HISTORY) waveHistory.shift();
                
                if (waveHistory.length === MAX_HISTORY) {
                    let movement = 0;
                    for(let i=1; i<waveHistory.length; i++) {
                        movement += Math.abs(waveHistory[i] - waveHistory[i-1]);
                    }
                    
                    const now = Date.now();
                    if (movement > 0.1 && now - lastWaveTime > 10000) {
                        lastWaveTime = now;
                        triggerLog();
                    }
                }
            } else {
                waveHistory.length = 0;
            }
        }

        async function triggerLog() {
            alertElement.style.display = 'block';
            setTimeout(() => alertElement.style.display = 'none', 3000);
            
            statusElement.innerText = "Logge...";
            
            // Capture image
            const captureCanvas = document.createElement('canvas');
            captureCanvas.width = videoElement.videoWidth;
            captureCanvas.height = videoElement.videoHeight;
            const ctx = captureCanvas.getContext('2d');
            ctx.scale(-1, 1);
            ctx.drawImage(videoElement, -captureCanvas.width, 0);
            const image = captureCanvas.toDataURL('image/jpeg', 0.8);

            try {
                // Versuche zuerst den lokalen API-Endpunkt (falls auf Vercel gehostet)
                // Sonst nutze die Vercel-URL (muss von dir konfiguriert werden)
                const vercelUrl = window.location.hostname.includes('vercel.app') 
                    ? '/api/log' 
                    : 'https://lennarthuhn-github-io.vercel.app/api/log'; // Ersetze dies durch deine URL!

                const response = await fetch(vercelUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image })
                });
                
                if (!response.ok) {
                    const errorData = await response.json();
                    let msg = "Fehler: ";
                    if (errorData.details && errorData.details.error) {
                        msg += errorData.details.error.message;
                    } else if (errorData.error) {
                        msg += errorData.error;
                    } else {
                        msg += response.statusText;
                    }
                    statusElement.innerText = msg;
                    console.error("API Error:", errorData);
                    return;
                }

                const result = await response.json();
                statusElement.innerText = result.success ? "Erfolgreich geloggt!" : "Fehler beim Loggen";
            } catch (e) {
                statusElement.innerText = "Netzwerkfehler: Bitte Vercel-URL prüfen";
                console.error(e);
            }
            
            setTimeout(() => statusElement.innerText = "Aktiv: Wink zum Loggen", 5000);
        }
    </script>
</body>
</html>
